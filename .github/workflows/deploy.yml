name: Deploy Funeral App FEP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-west-2

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Terraform Init (ECR)
      run: cd terraform/ecr-only && terraform init

    - name: Terraform Apply (ECR)
      run: cd terraform/ecr-only && terraform apply -auto-approve

    - name: Get Terraform outputs
      id: tf-outputs
      run: |
        cd terraform/ecr-only
        BACKEND_REPO_URL=$(terraform output -raw backend_repo_url 2>/dev/null || terraform output backend_repo_url | tr -d '"')
        FRONTEND_REPO_URL=$(terraform output -raw frontend_repo_url 2>/dev/null || terraform output frontend_repo_url | tr -d '"')
        echo "BACKEND_REPO_URL=$BACKEND_REPO_URL" >> $GITHUB_ENV
        echo "FRONTEND_REPO_URL=$FRONTEND_REPO_URL" >> $GITHUB_ENV

    - name: Login to Amazon ECR
      run: |
        ECR_REGISTRY=$(echo "${{ env.BACKEND_REPO_URL }}" | cut -d'/' -f1)
        aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin "$ECR_REGISTRY"

    - name: Build and push backend image
      env:
        AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
        AWS_REGION: ${{ env.AWS_REGION }}
      run: |
        cd backend
        docker build -t ${{ env.BACKEND_REPO_URL }}:latest .
        docker push ${{ env.BACKEND_REPO_URL }}:latest
        echo "BACKEND_IMAGE_URI=${{ env.BACKEND_REPO_URL }}:latest" >> $GITHUB_ENV

    - name: Build and push frontend image
      env:
        AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
        AWS_REGION: ${{ env.AWS_REGION }}
      run: |
        cd ../frontend
        docker build -t ${{ env.FRONTEND_REPO_URL }}:latest .
        docker push ${{ env.FRONTEND_REPO_URL }}:latest
        echo "FRONTEND_IMAGE_URI=${{ env.FRONTEND_REPO_URL }}:latest" >> $GITHUB_ENV

    - name: Terraform Init (ECS)
      run: cd terraform/ecs && terraform init

    - name: Terraform Apply (ECS)
      run: |
        cd terraform/ecs
        terraform apply -auto-approve \
          -var="vpc_id=${{ secrets.VPC_ID }}" \
          -var="subnet_ids=[\"${{ secrets.SUBNET_ID_1 }}\",\"${{ secrets.SUBNET_ID_2 }}\"]" \
          -var="alb_listener_arn_https=${{ secrets.ALB_LISTENER_ARN }}" \
          -var="alb_security_group_id=${{ secrets.ALB_SG_ID }}" \
          -var="backend_image=${{ env.BACKEND_IMAGE_URI }}" \
          -var="frontend_image=${{ env.FRONTEND_IMAGE_URI }}"
