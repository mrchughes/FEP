name: Deploy FEP App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      VPC_ID: ${{ secrets.VPC_ID }}
      SUBNET_ID_1: ${{ secrets.SUBNET_ID_1 }}
      SUBNET_ID_2: ${{ secrets.SUBNET_ID_2 }}
      ALB_SG_ID: ${{ secrets.ALB_SG_ID }}
      ALB_LISTENER_ARN: ${{ secrets.ALB_LISTENER_ARN }}
      BACKEND_ECR_REPO: ${{ secrets.BACKEND_ECR_REPO }}
      FRONTEND_ECR_REPO: ${{ secrets.FRONTEND_ECR_REPO }}
      TF_BUCKET_NAME: your-tf-state-bucket-name
      TF_LOCK_TABLE: your-tf-lock-table

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Plan
        run: terraform plan
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        run: |
          docker build -t ${{ env.BACKEND_ECR_REPO }} ./backend
          docker tag ${{ env.BACKEND_ECR_REPO }}:latest ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPO }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPO }}:latest

      - name: Build frontend image
        run: |
          docker build -t ${{ env.FRONTEND_ECR_REPO }} ./frontend
          docker tag ${{ env.FRONTEND_ECR_REPO }}:latest ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPO }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPO }}:latest
